<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sebin M Baby | Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="logo">Sebin M Baby</div>
    <nav>
      <a href="#about">About</a>
      <a href="#experience">Experience</a>
      <a href="#projects">Projects</a>
      <a href="#skills">Skills</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <p class="badge" id="location"></p>
      <h1 id="name"></h1>
      <h2 id="title"></h2>
      <p id="summary"></p>

      <div class="buttons">
        <a id="githubLink" class="btn primary" target="_blank">GitHub</a>
        <a id="linkedinLink" class="btn" target="_blank">LinkedIn</a>
        <a id="emailLink" class="btn">Email Me</a>
      </div>
    </section>

    <section id="about" class="section">
      <h2>About</h2>
      <p id="aboutText"></p>
    </section>

    <section id="experience" class="section">
      <h2>Experience</h2>
      <div id="experienceList"></div>
    </section>

    <section id="projects" class="section">
      <h2>Projects</h2>
      <div id="projectList" class="grid"></div>
    </section>

    <section id="skills" class="section">
      <h2>Skills</h2>
      <div id="skillList" class="skills"></div>
    </section>

    <section id="contact" class="section contact">
      <h2>Contact</h2>
      <p id="contactText"></p>
    </section>
  </main>

  <footer>
    <p>© 2026 Sebin M Baby. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
